<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVRU Vaishali Result</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://cvrubihar.ac.in/img/16f5e925a74a199a0822e08139a2e74c') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://cvrubihar.ac.in/img/16f5e925a74a199a0822e08139a2e74c') no-repeat center center fixed;
      background-size: cover;
      filter: blur(8px); 
      z-index: -1;
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 25px 25px 5px 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h2 {
      color: #004080;
      margin-bottom: 15px;
    }

    input[type="text"] {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      background-color: #004080;
      color: white;
      padding: 10px 20px;
      margin: 10px 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

     .footer-divider {
    border: none;
    height: 1px;
    margin: 20px 0 5px;
    background: linear-gradient(to right, #00d9ff, #1a1a2e);
    border-radius: 2px;
    box-shadow: 0 0 4px rgba(0, 217, 255, 0.5);
    }

     .footer-note {
    border-radius: 8px;
    color: #004080;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size:  14px;
  }

  .footer-note strong {
    color: #004080;
    font-weight: 600;
    text-shadow: 0 0 3px rgba(0, 217, 255, 0.3);
  }
  .headline{
    color:#004080;
    size: 20px;
    font-weight: 600;
    line-height: 1.5;
  }
  
  p{
    font-size: 14px;
  }
  #resultBox{
    padding: 10px;
  background-color: #fff7d2;
  border-radius: 15px 0px;
  box-shadow:0 0 10px rgba(0, 0, 0, 0.2) ;
  }

    @media (max-width: 480px) {
      .container {
        padding: 20px 15px 5px 15px;
      }
       .footer-note {
      font-size: 13px;
      padding: 5px;
      }
      input[type="text"] {
        width: 90%;
      }
      button {
        width: 100%;
        margin: 10px 0;
      }
      .headline{
        size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="cvrulogo.jpg" alt="Logo" style="width: 100%; max-width: 100%; margin-bottom: 15px;" />
    <div class="headline">BCA / B.Sc (IT) / M.Sc (IT) <br> 1st Sem (DEC 2025) Result</div>
    <input type="text" id="rollNo" placeholder="Enter Roll Number" required/>
    <input type="text" id="studentName" placeholder="Enter Student Name" required/>
    <div>
      <button id="checkBtn" onclick="checkResult()">Check Result</button>
      <button id="resetBtn" class="hidden" onclick="resetForm()">Check Another Result</button>
    </div>
    <div class="message" id="message"></div>
    <div id="resultBox" class="hidden"></div>
    <hr class="footer-divider">
    <footer class="footer-note">
      <p>This page is developed and maintained by the <strong>Department of CSE, CVRU Vaishali</strong>.</p>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    let studentData = [];

    async function loadExcelData() {
      const response = await fetch("students.xlsx");
      const arrayBuffer = await response.arrayBuffer();
      const data = new Uint8Array(arrayBuffer);
      const workbook = XLSX.read(data, { type: "array" });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      studentData = XLSX.utils.sheet_to_json(firstSheet);
    }

    async function checkResult() {
      if (studentData.length === 0) {
        await loadExcelData();
      }

      const rollNo = document.getElementById("rollNo").value.trim();
      const studentName = document.getElementById("studentName").value.trim().toUpperCase();
      const message = document.getElementById("message");
      const resultBox = document.getElementById("resultBox");
      const checkBtn = document.getElementById("checkBtn");
      const resetBtn = document.getElementById("resetBtn");

      const student = studentData.find(
        s => String(s.RollNo).trim() === rollNo && String(s.StudentName).trim().toUpperCase() === studentName
      );

      if (student) {
        message.textContent = "";

        const headerMessage = student.Status === 'PASS'
          ? `<h2><span>🎉</span><span style="background: linear-gradient(90deg, #ff6a00, #ee0979, #8e2de2, #4a00e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold;">Congratulations!</span></h2>`
          : '<div class="headline">🤔 Contact Your Department</div>';

        resultBox.innerHTML = `
          ${headerMessage}
          <p><strong>Roll No:</strong> ${student.RollNo}</p>
          <p><strong>Name:</strong> ${student.StudentName}</p>
          <p><strong>SGPA:</strong> ${student.SGPA}</p>
          <p><strong>Status:</strong> 
            <span style="color: ${student.Status === 'PASS' ? 'green' : 'red'}">${student.Status}</span>
          </p>
        `;

        resultBox.classList.remove("hidden");
        checkBtn.classList.add("hidden");
        resetBtn.classList.remove("hidden");
      } else {
        resultBox.classList.add("hidden");
        message.innerHTML = "❌ Invalid details or Enter roll no in caps lock, or ABC ID has not been submitted. Please try again or contact Prof. Prabhat Ranjan or Prof. Amit Kunwar for assistance.";
      }
    }

    function resetForm() {
      document.getElementById("rollNo").value = "";
      document.getElementById("studentName").value = "";
      document.getElementById("message").textContent = "";
      document.getElementById("resultBox").classList.add("hidden");
      document.getElementById("checkBtn").classList.remove("hidden");
      document.getElementById("resetBtn").classList.add("hidden");
    }
  </script>
</body>
</html>
